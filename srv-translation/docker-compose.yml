services:
  lt:
    image: 'libretranslate/libretranslate:latest'
    container_name: libretranslate
    user: '1032:1032'
    restart: always
    ports:
      - '5000:5000'
    volumes:
      - 'lt-forced-data:/home/libretranslate/.local'
      - 'lt-forced-db:/app/db'
      - 'lt-forced-config:/home/libretranslate/.config'
      - 'lt-forced-cache:/home/libretranslate/.cache'
    environment:
      - 'LT_LOAD_ONLY=en,it,es'
    command: ["/app/venv/bin/gunicorn", "-b", "0.0.0.0:5000", "-w", "2", "libretranslate.main:app"]
    networks:
      - coolify

networks:
  coolify:
    external: true

volumes:
  lt-forced-data:
  lt-forced-db:
  lt-forced-config:
  lt-forced-cache:

